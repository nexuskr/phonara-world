name: Hybrid Prerender

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 1

  prerender:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Restore dist
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist
      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium
      - name: Run prerender + leak check
        run: |
          node scripts/prerender.mjs
          node scripts/check-prerender-leak.mjs
      - name: Upload prerender report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prerender-report-${{ github.sha }}
          path: reports/prerender-report.json
          if-no-files-found: warn
          retention-days: 7
